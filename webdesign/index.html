/* ── Design tokens ──────────────────────────────────── */

const BORDER = '#1E1E1E';
const BORDER2 = '#2A2A2A';
const TEXT   = '#F0EDE8';
const MUTED  = '#888';

/* ── useInView hook ─────────────────────────────────── */
const useInView = (t = .15) => {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = document.getElementById('scroll');
    const c = () => {
      if (!ref.current) return;
      if (ref.current.getBoundingClientRect().top < window.innerHeight * (1 - t)) setVis(true);
    };
    el && el.addEventListener('scroll', c);
    c();
    return () => el && el.removeEventListener('scroll', c);
  }, []);
  return [ref, vis];
};

/* ── Shared components ──────────────────────────────── */
