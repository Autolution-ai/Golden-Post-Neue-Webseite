const useCountUp = (target, started, duration) => {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!started) return;
    setVal(0);
    const startT = performance.now();
    const tick = (now) => {
      const t = Math.min((now - startT) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      setVal(Math.round(eased * target));
      if (t < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [started, target]);
  return val;
};

const StatsSection = () => {
  const [started, setStarted] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const el = document.getElementById('app-scroll');
    const check = () => {
      if (!ref.current) return;
      const rect = ref.current.getBoundingClientRect();
      if (rect.top < window.innerHeight * 0.85) setStarted(true);
    };
    el && el.addEventListener('scroll', check);
    check();
    return () => el && el.removeEventListener('scroll', check);
  }, []);

  const v500 = useCountUp(500, started, 1800);
  const v50 = useCountUp(50, started, 1600);
  const v48 = useCountUp(48, started, 1400);

  const stats = [
    { value: started ? `${v500}+` : '0+', label: 'Produzierte Videos im Monat' },
    { value: '7-stellige', label: 'Umsätze für Kunden generiert', gold: true },
    { value: started ? `${v50}+` : '0+', label: 'Partnerbetriebe' },
    { value: started ? `${v48}h` : '0h', label: 'Lieferzeit nach Drehtag' },
  ];

  return (
    <section ref={ref} style={{ padding: '80px 48px', borderTop: '1px solid #1E1E1E', borderBottom: '1px solid #1E1E1E' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(4,1fr)' }}>
        {stats.map((s, i) => (
          <div key={i} style={{
            textAlign: 'center', padding: '16px 24px',
            borderRight: i < 3 ? '1px solid #1E1E1E' : 'none',
          }}>
            <div style={{
              fontFamily: 'Syne, sans-serif', fontSize: 'clamp(36px,4vw,56px)', fontWeight: 700,
              color: '#C8A96E', letterSpacing: '-0.04em', lineHeight: 1,

        ))}

  );
};

const useCountdown = () => {
  const target = useRef(Date.now() + 7 * 24 * 60 * 60 * 1000);
  const [time, setTime] = useState({ d: 7, h: 0, m: 0, s: 0 });
  useEffect(() => {
    const tick = () => {
      const diff = Math.max(0, target.current - Date.now());
      setTime({
        d: Math.floor(diff / 86400000),
        h: Math.floor((diff % 86400000) / 3600000),
        m: Math.floor((diff % 3600000) / 60000),
        s: Math.floor((diff % 60000) / 1000),
      });
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);
  return time;
};

const App = () => {
  const scrollTo = (id) => {
    const el = document.getElementById(id);
    const scroller = document.getElementById('app-scroll');
    if (el && scroller) {
      scroller.scrollTo({ top: el.offsetTop - 72, behavior: 'smooth' });
    }
  };

  const handleNav = (dest) => {
    const map = {
      leistungen: 'leistungen',
      referenzen: 'referenzen',
      prozess: 'prozess',
      faq: 'faq',
      kontakt: 'kontakt',
      hero: 'hero',
    };
    if (map[dest]) scrollTo(map[dest]);
  };

  return (
    <div id="app-scroll">
      <Nav onNavigate={handleNav} />

      <div id="hero">
        <Hero
          onPrimary={() => scrollTo('kontakt')}
          onSecondary={() => scrollTo('referenzen')}
        />
      </div>

      <StatsSection />
      <ProblemSection />
      <ServicesSection onContact={() => scrollTo('kontakt')} />
      <CaseStudies />
      <ProcessSection />
      <FreebieSection onContact={() => scrollTo('kontakt')} />
      <ComparisonSection />
      <FAQSection />
      <FinalCTA onContact={() => scrollTo('kontakt')} />
      <FooterSection onNavigate={handleNav} />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
