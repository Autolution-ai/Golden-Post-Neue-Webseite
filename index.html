<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoldenPost — Premium Marketing für KMUs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#080808;-webkit-font-smoothing:antialiased}
    #root{height:100%}
    #scroll{height:100vh;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}
    #scroll::-webkit-scrollbar{width:4px}
    #scroll::-webkit-scrollbar-track{background:#080808}
    #scroll::-webkit-scrollbar-thumb{background:#2A2A2A;border-radius:2px}
    .no-sb{scrollbar-width:none;-ms-overflow-style:none}
    .no-sb::-webkit-scrollbar{display:none}
    @keyframes gridMove{0%{transform:translateY(0)}100%{transform:translateY(64px)}}
    @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 32px rgba(200,169,110,.38)}50%{box-shadow:0 0 56px rgba(200,169,110,.62)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes rotateBg{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;pointer-events:none;z-index:9999}
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

/* ── Shared helpers ── */
const Gold = ({children,style={}}) => <span style={{color:'#C8A96E',...style}}>{children}</span>;
const Tag = ({children}) => (
  <div style={{display:'inline-flex',alignItems:'center',gap:7,background:'#C8A96E18',border:'1px solid #C8A96E44',borderRadius:9999,padding:'5px 14px',marginBottom:28}}>
    <div style={{width:5,height:5,borderRadius:'50%',background:'#C8A96E',boxShadow:'0 0 8px #C8A96E'}}/>
    <span style={{fontFamily:'Inter,sans-serif',fontSize:10,fontWeight:600,letterSpacing:'.13em',textTransform:'uppercase',color:'#C8A96E'}}>{children}</span>
  </div>
);
const useInView = (threshold=.15) => {
  const ref = useRef(null); const [vis,setVis] = useState(false);
  useEffect(()=>{
    const el=document.getElementById('scroll');
    const check=()=>{if(!ref.current)return;const r=ref.current.getBoundingClientRect();if(r.top<window.innerHeight*(1-threshold))setVis(true);};
    el&&el.addEventListener('scroll',check);check();
    return()=>el&&el.removeEventListener('scroll',check);
  },[]);
  return [ref,vis];
};
const GoldBtn = ({children,href,onClick,big,outline})=>{
  const [hov,setHov]=useState(false);
  const base={fontFamily:'Inter,sans-serif',fontWeight:600,borderRadius:10,cursor:'pointer',transition:'all 200ms',display:'inline-block',textDecoration:'none',textAlign:'center'};
  if(outline) return(
    <a href={href||'#'} onClick={onClick} style={{...base,fontSize:big?15:13,padding:big?'15px 38px':'9px 22px',background:hov?'#C8A96E18':'transparent',border:'1px solid #C8A96E55',color:'#C8A96E'}}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>{children}</a>
  );
  return(
    <a href={href||'#'} onClick={onClick} style={{...base,fontSize:big?15:13,padding:big?'15px 38px':'9px 22px',background:'linear-gradient(135deg,#C8A96E,#E2C990,#A07840)',color:'#080808',boxShadow:hov?'0 0 40px rgba(200,169,110,.55)':'0 0 24px rgba(200,169,110,.3)',filter:hov?'brightness(1.08)':'none',animation:'pulse 3s ease-in-out infinite'}}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>{children}</a>
  );
};

/* ── Nav ── */
const Nav = () => {
  const [scrolled,setScrolled]=useState(false);
  useEffect(()=>{const el=document.getElementById('scroll');const h=()=>setScrolled(el.scrollTop>40);el&&el.addEventListener('scroll',h);return()=>el&&el.removeEventListener('scroll',h);},[]);
  const links=[{label:'Content',href:'/content/'},{ label:'Social Media',href:'/social-media/'},{label:'Webdesign',href:'/webdesign/'}];
  return(
    <nav style={{position:'fixed',top:0,left:0,right:0,height:68,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 48px',zIndex:1000,background:scrolled?'rgba(8,8,8,.92)':'transparent',backdropFilter:scrolled?'blur(20px)':'none',borderBottom:scrolled?'1px solid #1E1E1E':'1px solid transparent',transition:'all 300ms'}}>
      <a href="/" style={{display:'flex',alignItems:'center',gap:10,textDecoration:'none'}}>
        <img src="assets/logo.png" width={32} height={32} style={{borderRadius:6}} alt="GP"/>
        <span style={{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,color:'#F0EDE8',letterSpacing:'-.01em'}}>GOLDEN POST</span>
      </a>
      <div style={{display:'flex',gap:32}}>
        {links.map(l=>(
          <a key={l.label} href={l.href} style={{fontFamily:'Inter,sans-serif',fontSize:13,fontWeight:500,color:'#666',textDecoration:'none',transition:'color 200ms'}}
            onMouseEnter={e=>e.target.style.color='#F0EDE8'} onMouseLeave={e=>e.target.style.color='#666'}>{l.label}</a>
        ))}
      </div>
      <GoldBtn href="#kontakt">Gespräch buchen</GoldBtn>
    </nav>
  );
};

/* ── Hero ── */
const Hero = () => {
  const [vis,setVis]=useState(false);
  useEffect(()=>{setTimeout(()=>setVis(true),100);},[]);
  return(
    <section style={{position:'relative',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'120px 48px 80px',overflow:'hidden'}}>
      {/* grid */}
      <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(#1E1E1E 1px,transparent 1px),linear-gradient(90deg,#1E1E1E 1px,transparent 1px)',backgroundSize:'64px 64px',opacity:.3,animation:'gridMove 24s linear infinite'}}/>
      {/* glow */}
      <div style={{position:'absolute',top:'-10%',left:'50%',transform:'translateX(-50%)',width:900,height:600,background:'radial-gradient(ellipse,#C8A96E1A 0%,transparent 65%)',pointerEvents:'none'}}/>
      {/* content */}
      <div style={{position:'relative',maxWidth:820,textAlign:'center',opacity:vis?1:0,transform:vis?'translateY(0)':'translateY(30px)',transition:'opacity 800ms ease,transform 800ms cubic-bezier(.4,0,.2,1)'}}>
        <Tag>Premium Done-For-You Agentur</Tag>
        <h1 style={{fontFamily:'Syne,sans-serif',fontSize:'clamp(40px,6.5vw,90px)',fontWeight:700,color:'#F0EDE8',lineHeight:1.02,letterSpacing:'-.04em',marginBottom:24}}>
          Dein Unternehmen.<br/><Gold>Unsere Mission.</Gold>
        </h1>
        <p style={{fontFamily:'Inter,sans-serif',fontSize:18,color:'#666',lineHeight:1.65,maxWidth:520,margin:'0 auto 48px'}}>
          Von Hannes & Jonas gegründet – GoldenPost macht aus KMUs Marken, die online dominieren.<br/>
          <span style={{color:'#888',fontWeight:500}}>Content · Social Media · Webdesign. 100% Done-For-You.</span>
        </p>
        <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
          <GoldBtn href="#kontakt" big>Jetzt Gespräch buchen</GoldBtn>
          <GoldBtn href="#leistungen" big outline>Leistungen ansehen</GoldBtn>
        </div>
        {/* founder avatars below */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginTop:52}}>
          <div style={{display:'flex'}}>
            {['H','J'].map((l,i)=>(
              <div key={i} style={{width:36,height:36,borderRadius:'50%',border:'2px solid #080808',marginLeft:i?-10:0,
                background:i?'linear-gradient(135deg,#1a3a4a,#2d6a8a)':'linear-gradient(135deg,#3a2800,#C8A96E)',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontFamily:'Syne,sans-serif',fontSize:13,fontWeight:800,color:'#F0EDE8'}}>
                {l}
              </div>
            ))}
          </div>
          <span style={{fontFamily:'Inter,sans-serif',fontSize:13,color:'#555'}}>Gegründet von <span style={{color:'#888'}}>Hannes & Jonas</span> aus Deutschland</span>
        </div>
      </div>
    </section>
  );
};

/* ── Marquee ── */
const Marquee = () => {
  const logos=['Eisbuben Manufaktur','ITA Engineering','Thorn Immobilien','raumton GmbH','Kanzlei Becker','Sanitär Weber','Bäckerei Kranz','Autohaus Fischer','MedCenter Nord','Handwerk Braun'];
  const d=[...logos,...logos];
  return(
    <div style={{padding:'32px 0',borderTop:'1px solid #1E1E1E',borderBottom:'1px solid #1E1E1E',overflow:'hidden'}}>
      <p style={{textAlign:'center',fontFamily:'Inter,sans-serif',fontSize:10,color:'#333',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:20}}>Vertrauen von 50+ Unternehmen</p>
      <div style={{maskImage:'linear-gradient(90deg,transparent,black 8%,black 92%,transparent)',WebkitMaskImage:'linear-gradient(90deg,transparent,black 8%,black 92%,transparent)'}}>
        <div className="no-sb" style={{display:'flex',animation:'marquee 35s linear infinite',width:'max-content'}}
          onMouseEnter={e=>e.currentTarget.style.animationPlayState='paused'}
          onMouseLeave={e=>e.currentTarget.style.animationPlayState='running'}>
          {d.map((name,i)=>(
            <div key={i} style={{margin:'0 48px',opacity:.22,fontFamily:'Syne,sans-serif',fontSize:12,fontWeight:700,color:'#F0EDE8',letterSpacing:'.05em',textTransform:'uppercase',whiteSpace:'nowrap',transition:'all 300ms'}}
              onMouseEnter={e=>{e.currentTarget.style.opacity='.75';e.currentTarget.style.color='#C8A96E';}}
              onMouseLeave={e=>{e.currentTarget.style.opacity='.22';e.currentTarget.style.color='#F0EDE8';}}
            >{name}</div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ── Services ── */
const services = [
  {
    id:'content', href:'/content/',
    icon:<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 10l4.553-2.069A1 1 0 0121 8.87V15.13a1 1 0 01-1.447.899L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>,
    label:'Content Produktion',
    headline:'Videos & Fotos, die verkaufen.',
    desc:'Monatlicher Drehtag vor Ort – unser Team kommt zu dir. 4 Stunden Dreh ergeben einen ganzen Monat hochwertigen Content für alle Plattformen.',
    points:['Strategie & Konzept','Drehtag vor Ort','Schnitt & Post-Produktion','Veröffentlichung & Monitoring'],
    stat:'500+ Videos/Monat',
    accent:'#C8A96E',
  },
  {
    id:'social',href:'/social-media/',
    icon:<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
    label:'Social Media Management',
    headline:'Dein Kanal. Vollständig verwaltet.',
    desc:'Wir übernehmen dein komplettes Social Media – von der Strategie über das Posting bis zum Community Management. Du machst dein Business, wir die Sichtbarkeit.',
    points:['Kanal-Strategie','Content-Kalender & Posting','Community Management','Analytics & Reporting'],
    stat:'3.2M Reichweite / Kunde',
    accent:'#A78BFA',
  },
  {
    id:'web',href:'/webdesign/',
    icon:<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>,
    label:'Webdesign & SEO',
    headline:'Websites, die konvertieren.',
    desc:'Wir bauen keine schönen Websites – wir bauen Vertriebsmaschinen. Conversion-optimiert, SEO-ready und auf echte Ergebnisse ausgerichtet.',
    points:['Conversion-optimiertes Design','Technisches SEO-Setup','Monatliche Optimierung','Hosting & Wartung inklusive'],
    stat:'+180% mehr Anfragen',
    accent:'#60A5FA',
  },
];

const ServiceCard = ({s}) => {
  const [hov,setHov]=useState(false);
  const [ref,vis]=useInView(.1);
  return(
    <div ref={ref} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{
      background:'#0D0D0D',border:`1px solid ${hov?s.accent+'55':'#2A2A2A'}`,
      borderTop:`2px solid ${hov?s.accent:s.accent+'44'}`,
      borderRadius:20,padding:'40px 36px',transition:'all 350ms cubic-bezier(.4,0,.2,1)',
      transform:hov?'translateY(-6px)':'translateY(0)',
      boxShadow:hov?`0 24px 64px ${s.accent}18`:'none',
      opacity:vis?1:0,transitionDelay:vis?'0ms':'0ms',
    }}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:28}}>
        <div style={{color:s.accent,transition:'all 300ms',transform:hov?'scale(1.1)':'scale(1)'}}>{s.icon}</div>
        <div style={{background:'#1A1A1A',border:'1px solid #2A2A2A',borderRadius:5,padding:'3px 10px'}}>
          <span style={{fontFamily:'Inter,sans-serif',fontSize:9,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'#555'}}>{s.label}</span>
        </div>
      </div>
      <h3 style={{fontFamily:'Syne,sans-serif',fontSize:26,fontWeight:700,color:'#F0EDE8',letterSpacing:'-.02em',lineHeight:1.2,marginBottom:14}}>{s.headline}</h3>
      <p style={{fontFamily:'Inter,sans-serif',fontSize:14,color:'#666',lineHeight:1.75,marginBottom:24}}>{s.desc}</p>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:32}}>
        {s.points.map((p,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:s.accent,flexShrink:0}}/>
            <span style={{fontFamily:'Inter,sans-serif',fontSize:13,color:'#888'}}>{p}</span>
          </div>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',borderTop:'1px solid #1E1E1E',paddingTop:20}}>
        <div style={{background:`${s.accent}18`,border:`1px solid ${s.accent}44`,borderRadius:6,padding:'4px 12px'}}>
          <span style={{fontFamily:'Syne,sans-serif',fontSize:12,fontWeight:700,color:s.accent}}>{s.stat}</span>
        </div>
        <a href={s.href} style={{display:'flex',alignItems:'center',gap:6,fontFamily:'Inter,sans-serif',fontSize:13,fontWeight:500,color:s.accent,textDecoration:'none',transition:'gap 200ms'}}
          onMouseEnter={e=>e.currentTarget.style.gap='10px'} onMouseLeave={e=>e.currentTarget.style.gap='6px'}>
          Mehr erfahren <span>→</span>
        </a>
      </div>
    </div>
  );
};

const ServicesSection = () => {
  const [ref,vis]=useInView();
  return(
    <section id="leistungen" style={{padding:'120px 48px',background:'#080808'}}>
      <div style={{maxWidth:1140,margin:'0 auto'}}>
        <div ref={ref} style={{textAlign:'center',marginBottom:64,opacity:vis?1:0,transform:vis?'translateY(0)':'translateY(20px)',transition:'all 600ms'}}>
          <Tag>Unsere Leistungen</Tag>
          <h2 style={{fontFamily:'Syne,sans-serif',fontSize:'clamp(32px,4vw,56px)',fontWeight:700,color:'#F0EDE8',letterSpacing:'-.03em',lineHeight:1.1}}>
            Die 3 Säulen<br/>deines Wachstums
          </h2>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}}>
          {services.map(s=><ServiceCard key={s.id} s={s}/>)}
        </div>
      </div>
    </section>
  );
};

/* ── Founders ── */
const founders = [
  {
    initial:'H',name:'Hannes',role:'Kreativdirektor & Co-Gründer',
    grad:'linear-gradient(135deg,#3a1e00,#7a4510)',

  {

];

  return(
    <div ref={ref} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{
      background:'#0D0D0D',border:`1px solid ${hov?'#C8A96E44':'#2A2A2A'}`,borderRadius:20,

        </div>
      </div>

const FoundersSection = () => {
  const [ref,vis]=useInView();
  return(
    <section style={{padding:'120px 48px',background:'#0A0A0A',borderTop:'1px solid #1E1E1E'}}>
      <div style={{maxWidth:920,margin:'0 auto'}}>
        <div ref={ref} style={{textAlign:'center',marginBottom:64,opacity:vis?1:0,transform:vis?'translateY(0)':'translateY(20px)',transition:'all 600ms'}}>
          <Tag>Die Köpfe dahinter</Tag>
          <h2 style={{fontFamily:'Syne,sans-serif',fontSize:'clamp(32px,4vw,52px)',fontWeight:700,color:'#F0EDE8',letterSpacing:'-.03em',lineHeight:1.1}}>
            Keine Agentur.<br/>Ein echtes Team.
          </h2>
          <p style={{fontFamily:'Inter,sans-serif',fontSize:16,color:'#555',maxWidth:480,margin:'16px auto 0',lineHeight:1.7}}>

        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
          {founders.map((f,i)=><FounderCard key={f.name} f={f} delay={i*100}/>)}
        </div>
      </div>
    </section>

};

/* ── Social Proof ── */
const quotes=[
  {text:'"350 Bewerbungen in 60 Tagen. GoldenPost hat unser Recruiting komplett verändert."',name:'David K.',company:'ITA Engineering',result:'350 Bewerber'},
  {text:'"3,2 Millionen Aufrufe in 4 Monaten. Das war nicht absehbar – aber genau das, was wir brauchten."',name:'Thomas M.',company:'Eisbuben Manufaktur',result:'3.2M Reach'},
  {text:'"Seit dem Website-Relaunch haben wir 180% mehr Anfragen. Unglaublich."',name:'Regine T.',company:'Thorn Immobilien',result:'+180% Anfragen'},
];

const SocialProof = () => {
  const [ref,vis]=useInView();
  return(
    <section style={{padding:'100px 48px',background:'#080808',borderTop:'1px solid #1E1E1E'}}>
      <div style={{maxWidth:1080,margin:'0 auto'}}>
        <div ref={ref} style={{textAlign:'center',marginBottom:48,opacity:vis?1:0,transform:vis?'translateY(0)':'translateY(20px)',transition:'all 600ms'}}>
          <Tag>Ergebnisse sprechen lauter</Tag>
          <h2 style={{fontFamily:'Syne,sans-serif',fontSize:'clamp(28px,3.5vw,48px)',fontWeight:700,color:'#F0EDE8',letterSpacing:'-.03em'}}>Was unsere Kunden sagen</h2>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
          {quotes.map((q,i)=>(
            <div key={i} style={{background:'#0D0D0D',border:'1px solid #1E1E1E',borderRadius:16,padding:'32px 28px',opacity:vis?1:0,transform:vis?'translateY(0)':'translateY(24px)',transition:`all 600ms ${i*100}ms`}}>
              <div style={{fontFamily:'Syne,sans-serif',fontSize:32,fontWeight:700,color:'#C8A96E',marginBottom:4,letterSpacing:'-.03em'}}>{q.result}</div>
              <p style={{fontFamily:'Inter,sans-serif',fontSize:14,color:'#666',lineHeight:1.75,marginBottom:20,fontStyle:'italic'}}>{q.text}</p>
